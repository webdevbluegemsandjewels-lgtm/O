<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Bag — OrenkaFine</title>
<meta name="description" content="Review the items in your OrenkaFine shopping bag." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .cart-section{ padding: 2.4rem 0 5rem; }
  .cart-layout{ display:grid; grid-template-columns: 1.6fr 1fr; gap: 2.6rem; align-items:start; }
  .cart-items{ display:flex; flex-direction:column; gap: 1.2rem; }
  .cart-row{
    display:grid; grid-template-columns: 84px 1fr auto; gap: 1.2rem; align-items:center;
    background:#fff; border:1px solid var(--line); border-radius:12px; padding: 1rem;
  }
  .cart-row img{ width:84px; height:84px; object-fit:cover; border-radius:8px; }
  .cart-row h4{ font-size:1.02rem; margin-bottom:.3rem; }
  .cart-row .meta{ font-size:.82rem; color:var(--ink-soft); margin-bottom:.6rem; }
  .cart-qty{ display:flex; align-items:center; border:1px solid var(--line); border-radius:6px; width: fit-content; }
  .cart-qty button{ width:30px; height:32px; background:transparent; border:none; font-size:1rem; cursor:pointer; }
  .cart-qty span{ width:32px; text-align:center; font-size:.9rem; }
  .cart-row-right{ text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:.6rem; }
  .cart-row-price{ font-family: var(--font-display); font-size:1.15rem; }
  .cart-remove{ background:none; border:none; color: var(--ink-soft); font-size:.8rem; text-decoration:underline; cursor:pointer; padding:0; }
  .cart-empty{ text-align:center; padding: 4rem 0; color: var(--ink-soft); }
  .cart-summary{
    background:#fff; border:1px solid var(--line); border-radius:12px; padding: 1.6rem;
    position: sticky; top: 100px;
  }
  .cart-summary h3{ font-size:1.3rem; margin-bottom:1.2rem; }
  .summary-line{ display:flex; justify-content:space-between; font-size:.92rem; color:var(--ink-soft); margin-bottom:.7rem; }
  .summary-line.total{ color:var(--ink); font-weight:500; font-size:1.05rem; border-top:1px solid var(--line); padding-top:.9rem; margin-top:.9rem; }
  .checkout-btn{ width:100%; justify-content:center; margin-top:1.4rem; }
  @media (max-width: 860px){
    .cart-layout{ grid-template-columns: 1fr; }
    .cart-row{ grid-template-columns: 64px 1fr; }
    .cart-row img{ width:64px; height:64px; }
    .cart-row-right{ grid-column: 1 / -1; flex-direction:row; align-items:center; justify-content:space-between; }
  }
</style>
</head>
<body>

<div class="utility-bar">
  <div class="container">
    <span>Complimentary gift wrapping on every order</span>
    <span>Fast delivery &middot; Secure checkout</span>
  </div>
</div>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">OrenkaFine<small>Fine &amp; Light Weight Jewelry</small></a>
    <nav class="main-nav" aria-label="Primary">
      <a href="collections.html">Collections</a>
      <a href="about.html">The House</a>
      <a href="our-journey.html">Our Story</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="header-icons">
      <button class="icon-btn" aria-label="Search"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
      <a class="icon-btn" href="login.html" aria-label="Login" data-account-link><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></a>
      <button class="icon-btn" aria-label="Wishlist"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 21s-7.5-4.6-10-9C.5 8.5 2 4 6.2 4 8.7 4 10.7 5.6 12 7.4 13.3 5.6 15.3 4 17.8 4 22 4 23.5 8.5 22 12c-2.5 4.4-10 9-10 9z"/></svg></button>
      <a class="icon-btn" href="cart.html" aria-label="Shopping bag" style="position:relative;">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 8h12l-1 13H7L6 8z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>
        <span data-cart-count style="position:absolute;top:-4px;right:-4px;background:var(--gold);color:#fff;font-size:.62rem;font-weight:600;min-width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;padding:0 3px;"></span>
      </a>
      <button class="icon-btn nav-toggle" aria-label="Menu" aria-expanded="false"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    </div>
  </div>
</header>

<section class="cart-section">
  <div class="container">
    <p class="eyebrow">Your Bag</p>
    <h1 class="section-title" style="margin-bottom:2rem;">Shopping Bag</h1>

    <div id="cartEmpty" class="cart-empty" style="display:none;">
      <p>Your bag is empty.</p>
      <a href="collections.html" class="btn btn-outline-dark" style="margin-top:1rem;">Continue Shopping</a>
    </div>

    <div id="cartLayout" class="cart-layout" style="display:none;">
      <div class="cart-items" id="cartItems"></div>

      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-line"><span>Subtotal</span><span id="summarySubtotal">₹0</span></div>
        <div class="summary-line"><span>Shipping</span><span>Free</span></div>
        <div class="summary-line total"><span>Total</span><span id="summaryTotal">₹0</span></div>
        <button class="btn btn-gold checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
      </div>
    </div>
  </div>
</section>

<footer class="site-footer" id="footer"></footer>

<script src="js/supabaseClient.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth-modal.js"></script>
<script src="js/auth.js"></script>
<script src="js/footer.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const cartEmpty = document.getElementById("cartEmpty");
  const cartLayout = document.getElementById("cartLayout");
  const cartItemsEl = document.getElementById("cartItems");
  const summarySubtotal = document.getElementById("summarySubtotal");
  const summaryTotal = document.getElementById("summaryTotal");
  const checkoutBtn = document.getElementById("checkoutBtn");

  function money(n) {
    return `₹${Number(n).toLocaleString("en-IN")}`;
  }

  async function render() {
    const items = await window.OrenkaFineCart.getItems();

    if (!items.length)  {
      cartEmpty.style.display = "block";
      cartLayout.style.display = "none";
      return;
    }

    cartEmpty.style.display = "none";
    cartLayout.style.display = "grid";

    cartItemsEl.innerHTML = items.map((item) => `
      <div class="cart-row" data-id="${item.id}" data-color="${item.color || ""}">
        <img src="${item.image}" alt="${item.name}" />
        <div>
          <h4>${item.name}</h4>
          <p class="meta">${item.color ? `Color: ${item.color}` : ""}</p>
          <div class="cart-qty">
            <button type="button" data-action="dec" aria-label="Decrease quantity">&minus;</button>
            <span>${item.qty}</span>
            <button type="button" data-action="inc" aria-label="Increase quantity">+</button>
          </div>
        </div>
        <div class="cart-row-right">
          <span class="cart-row-price">${money(item.price * item.qty)}</span>
          <button type="button" class="cart-remove" data-action="remove">Remove</button>
        </div>
      </div>
    `).join("");

    const subtotal = await window.OrenkaFineCart.getSubtotal();
    summarySubtotal.textContent = money(subtotal);
    summaryTotal.textContent = money(subtotal);
  }

  cartItemsEl.addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-action]");
    if (!btn) return;
    const row = btn.closest(".cart-row");
    const id = row.dataset.id;
    const color = row.dataset.color || null;
    const items = await window.OrenkaFineCart.getItems();
    const item = items.find((i) => i.id === id && (i.color || null) === color);
    if (!item) return;

    if (btn.dataset.action === "inc") {
      await window.OrenkaFineCart.updateQty(id, color, item.qty + 1);
    } else if (btn.dataset.action === "dec") {
      await window.OrenkaFineCart.updateQty(id, color, item.qty - 1);
    } else if (btn.dataset.action === "remove") {
      await window.OrenkaFineCart.removeItem(id, color);
    }
    render();
  });

  checkoutBtn.addEventListener("click", async () => {
    const user = await requireAuth(); // opens login/signup popup if not signed in
    if (!user) return;
    window.location.href = "checkout.html";
  });

  render();
});
</script>
</body>
</html>
