<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — OrenkaFine</title>
<meta name="description" content="Log in to your OrenkaFine account." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .auth-section{ padding: 2.6rem 0 3.4rem; }
  .auth-card{
    display:grid; grid-template-columns: 1fr 1fr;
    max-width: 900px; margin: 0 auto;
    background: #fff; border: 1px solid var(--line);
    border-radius: 20px; padding: 0;
    box-shadow: 0 20px 50px rgba(22,20,15,.12);
    overflow: hidden;
  }
  .auth-visual{
    position: relative;
    min-height: 100%;
    background: linear-gradient(180deg, rgba(22,20,15,.1), rgba(22,20,15,.8)),
      url('https://images.unsplash.com/photo-1687253946687-a3713aa25b2f?auto=format&fit=crop&w=900&q=80') center/cover no-repeat;
    padding: 2.2rem;
    display:flex; flex-direction:column; justify-content:flex-end;
    color:#fff;
  }
  .auth-visual .eyebrow{ color: var(--gold-light); }
  .auth-visual h2{ font-size: 1.5rem; line-height:1.2; margin: .5rem 0 0; font-weight:500; }
  .auth-form-panel{ padding: 2.4rem 2.2rem; }
  .auth-card h1{ font-size: 1.6rem; margin-bottom: .3rem; }
  .auth-card .sub{ color: var(--ink-soft); font-size: .9rem; margin-bottom: 1.4rem; }
  .auth-field{ margin-bottom: .9rem; }
  .auth-field label{ display:block; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color: var(--ink-soft); margin-bottom:.4rem; }
  .auth-field input{
    width:100%; background:#fff; border: 1.5px solid #cfc7b6; border-radius: 8px;
    padding: .72rem .85rem; font-family: inherit; font-size: .95rem; color: var(--ink);
  }
  .auth-field input:focus{ border-color: var(--gold); outline:none; box-shadow: 0 0 0 3px rgba(169,130,76,.15); }
  .auth-submit{ width:100%; justify-content:center; margin-top:.3rem; }
  .auth-error{ color:#a9432f; font-size:.85rem; margin-bottom:.9rem; display:none; }
  .auth-switch{ text-align:center; margin-top:1.3rem; font-size:.88rem; color: var(--ink-soft); }
  .auth-switch a{ color: var(--gold); text-decoration:underline; }
  @media (max-width: 760px){
    .auth-card{ grid-template-columns: 1fr; max-width: 440px; border-radius:16px; }
    .auth-visual{ min-height: 140px; padding: 1.4rem; }
    .auth-visual h2{ font-size: 1.15rem; }
    .auth-form-panel{ padding: 1.8rem 1.4rem; }
  }
</style>
</head>
<body>

<div class="utility-bar">
  <div class="container">
    <span>Complimentary gift wrapping on every order</span>
    <span>Fast delivery &middot; Secure checkout</span>
  </div>
</div>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">OrenkaFine<small>Fine &amp; Light Weight Jewelry</small></a>
    <nav class="main-nav" aria-label="Primary">
      <a href="collections.html">Collections</a>
      <a href="about.html">The House</a>
      <a href="our-journey.html">Our Story</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="auth-section">
  <div class="container">
    <div class="auth-card">
      <div class="auth-visual">
        <p class="eyebrow">OrenkaFine</p>
        <h2>Jewelry for every chapter of you</h2>
      </div>
      <div class="auth-form-panel">
        <p class="eyebrow">Welcome back</p>
        <h1>Log in</h1>
        <p class="sub">Log in to write reviews and place orders.</p>

        <p class="auth-error" id="authError"></p>

        <form id="loginForm">
          <div class="auth-field">
            <label for="email">Email</label>
            <input id="email" type="email" required autocomplete="email" />
          </div>
          <div class="auth-field">
            <label for="password">Password</label>
            <input id="password" type="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-gold auth-submit" id="submitBtn">Log In</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </div>
</section>

<footer class="site-footer" id="footer"></footer>

<script src="js/supabaseClient.js"></script>
<script src="js/footer.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("loginForm");
  const errorEl = document.getElementById("authError");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorEl.style.display = "none";
    submitBtn.disabled = true;
    submitBtn.textContent = "Logging in…";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (error) {
      errorEl.textContent = error.message;
      errorEl.style.display = "block";
      submitBtn.disabled = false;
      submitBtn.textContent = "Log In";
      return;
    }

    const params = new URLSearchParams(window.location.search);
    const redirect = params.get("redirect");
    window.location.href = redirect ? decodeURIComponent(redirect) : "index.html";
  });
});
</script>
</body>
</html>
