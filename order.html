<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Order Confirmed — OrenkaFine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .success-section{ padding: 5rem 0; text-align:center; }
  .success-icon{ width:64px; height:64px; margin:0 auto 1.4rem; }
  .order-id{ font-family: var(--font-display); font-size:1.1rem; color: var(--gold); margin: 1rem 0 2rem; }
</style>
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">OrenkaFine<small>Fine &amp; Light Weight Jewelry</small></a>
    <nav class="main-nav" aria-label="Primary">
      <a href="collections.html">Collections</a>
      <a href="about.html">The House</a>
      <a href="our-journey.html">Our Story</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="header-icons"></div>
  </div>
</header>

<section class="success-section">
  <div class="container">
    <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="#4a7c59" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/></svg>
    <h1 class="section-title">Thank you for your order!</h1>
    <p class="order-id" id="orderIdDisplay"></p>
    <p>We've received your payment and your order is being prepared.</p>
    <a href="collections.html" class="btn btn-outline-dark" style="margin-top:2rem;">Continue Shopping</a>
  </div>
</section>

<footer class="site-footer" id="footer"></footer>
<script src="js/supabaseClient.js"></script>
<script src="js/footer.js"></script>
<script src="js/main.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get("order_id");
  if (orderId) {
    document.getElementById("orderIdDisplay").textContent = `Order #${orderId.slice(0, 8).toUpperCase()}`;
  }
</script>
</body>
</html>
